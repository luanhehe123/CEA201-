<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COA11e — Quiz theo Chương</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080d;--surface:#0f1117;--surface2:#161820;--surface3:#1e2028;
  --accent:#6ee7b7;--accent2:#34d399;--purple:#a78bfa;--blue:#60a5fa;
  --red:#f87171;--red-dim:rgba(248,113,113,0.12);--yellow:#fbbf24;
  --green:#6ee7b7;--green-dim:rgba(110,231,183,0.12);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8890a8;--text3:#454860;
  --mono:'JetBrains Mono',monospace;--sans:'Sora',sans-serif;
  --r:10px;--r2:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(110,231,183,0.06),transparent);pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 16px 80px;}

/* HEADER */
header{padding:52px 0 36px;text-align:center;}
.chip{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(110,231,183,0.08);border:1px solid rgba(110,231,183,0.2);border-radius:4px;padding:4px 14px;margin-bottom:16px;}
h1{font-size:clamp(26px,5vw,42px);font-weight:600;letter-spacing:-1.5px;line-height:1.15;}
h1 em{font-style:normal;color:var(--accent);}
.hdr-sub{font-size:14px;color:var(--text2);margin-top:10px;font-weight:300;}

/* CHAPTER GRID */
#home-screen{}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
.ch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 16px 16px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.ch-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(110,231,183,0.04),transparent);opacity:0;transition:opacity 0.2s;}
.ch-card:hover{border-color:rgba(110,231,183,0.35);transform:translateY(-2px);}
.ch-card:hover::before{opacity:1;}
.ch-num{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:6px;}
.ch-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;}
.ch-count{font-size:11px;color:var(--text3);margin-top:8px;font-family:var(--mono);}
.ch-done{position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(110,231,183,0.3);display:none;align-items:center;justify-content:center;font-size:10px;color:var(--accent);}
.ch-card.completed .ch-done{display:flex;}
.ch-card.completed{border-color:rgba(110,231,183,0.25);background:rgba(110,231,183,0.04);}

.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.18s;}
.btn:hover{background:var(--surface2);border-color:rgba(110,231,183,0.4);}
.btn-primary{background:var(--accent2);border-color:var(--accent2);color:#022c22;font-weight:600;}
.btn-primary:hover{background:var(--accent);border-color:var(--accent);color:#022c22;}
.btn-sm{padding:8px 16px;font-size:13px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

/* QUIZ */
#quiz-screen{display:none;}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.qhdr-title{font-size:15px;font-weight:600;color:var(--text);}
.qhdr-sub{font-size:12px;color:var(--text2);font-family:var(--mono);}
.prog-track{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--purple));border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.score-row{display:flex;gap:16px;font-size:12px;font-family:var(--mono);}
.score-g{color:var(--green);}
.score-r{color:var(--red);}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px 28px 24px;margin-bottom:14px;animation:fadeUp 0.22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.q-badge{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:4px;letter-spacing:1px;}
.q-num-badge{color:var(--accent);background:rgba(110,231,183,0.1);border:1px solid rgba(110,231,183,0.2);}
.q-tag-badge{color:var(--purple);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);}
.q-multi-badge{color:var(--yellow);background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);}
.q-text{font-size:16px;font-weight:400;line-height:1.7;color:var(--text);margin-bottom:22px;}

.opts{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.16s;text-align:left;width:100%;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.55;}
.opt:hover:not(:disabled){border-color:rgba(110,231,183,0.4);background:rgba(110,231,183,0.05);}
.opt:disabled{cursor:default;}
.opt-key{font-family:var(--mono);font-size:11px;font-weight:600;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);flex-shrink:0;margin-top:1px;transition:all 0.16s;}
.opt:hover:not(:disabled) .opt-key{background:var(--accent2);border-color:var(--accent2);color:#022c22;}
.opt.sel .opt-key,.opt.sel{border-color:rgba(110,231,183,0.4);background:rgba(110,231,183,0.06);}
.opt.sel .opt-key{background:var(--accent2);border-color:var(--accent2);color:#022c22;}
.opt.correct{border-color:rgba(110,231,183,0.6);background:var(--green-dim);}
.opt.correct .opt-key{background:var(--accent2);border-color:var(--accent2);color:#022c22;}
.opt.wrong{border-color:rgba(248,113,113,0.5);background:var(--red-dim);}
.opt.wrong .opt-key{background:var(--red);border-color:var(--red);color:#fff;}
.opt.reveal{border-color:rgba(110,231,183,0.5);background:var(--green-dim);}
.opt.reveal .opt-key{background:var(--accent2);border-color:var(--accent2);color:#022c22;}

.feedback{display:none;margin-top:12px;padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid;}
.feedback.ok{background:var(--green-dim);border-color:rgba(110,231,183,0.3);color:var(--accent);}
.feedback.no{background:var(--red-dim);border-color:rgba(248,113,113,0.3);color:var(--red);}

.nav-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:4px;}

/* NUMPAD */
.numpad-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px;}
.numpad-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.numpad{display:flex;flex-wrap:wrap;gap:5px;}
.np{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--mono);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.13s;}
.np:hover{border-color:rgba(110,231,183,0.4);color:var(--accent);}
.np.ok{background:rgba(110,231,183,0.12);border-color:rgba(110,231,183,0.3);color:var(--accent);}
.np.bad{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.3);color:var(--red);}
.np.cur{background:var(--accent2);border-color:var(--accent2);color:#022c22;}

/* RESULT */
#result-screen{display:none;}
.res-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:44px 28px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,rgba(110,231,183,0.15),transparent 70%);pointer-events:none;}
.res-pct{font-family:var(--mono);font-size:68px;font-weight:600;line-height:1;margin-bottom:6px;}
.res-grade{font-size:18px;font-weight:500;margin-bottom:6px;}
.res-sub{font-size:13px;color:var(--text2);}
.res-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:500px){.res-stats{grid-template-columns:1fr 1fr;}}
.st-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.st-n{font-family:var(--mono);font-size:22px;font-weight:600;}
.st-l{font-size:11px;color:var(--text3);margin-top:3px;}

.wrong-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:16px;}
.wrong-section h3{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:18px;}
.wi{border-top:1px solid var(--border);padding:14px 0;}
.wi:first-child{border-top:none;}
.wi-q{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:8px;}
.wi-tags{display:flex;gap:6px;flex-wrap:wrap;}
.wi-your{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--red-dim);border:1px solid rgba(248,113,113,0.25);color:var(--red);}
.wi-ans{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--green-dim);border:1px solid rgba(110,231,183,0.25);color:var(--accent);}

@media(max-width:600px){.q-card{padding:18px 14px;} .nav-bar{padding:12px 14px;} .ch-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="chip">COA 11th Edition</div>
  <h1>Computer Organization<br>& <em>Architecture</em> Quiz</h1>
  <p class="hdr-sub">20 chương · Câu hỏi từ slide bài giảng · Luyện tập theo chương</p>
</header>

<!-- HOME -->
<div id="home-screen">
  <div class="ch-grid" id="ch-grid"></div>
  <div class="btn-row" style="justify-content:center;margin-top:8px;">
    <button class="btn btn-primary" onclick="startAll()">Làm tất cả các chương →</button>
    <button class="btn" onclick="startRandom()">🎲 Ngẫu nhiên</button>
    <button class="btn" id="btn-retry-wrong" style="display:none" onclick="startWrong()">🔁 Ôn câu sai</button>
  </div>
</div>

<!-- NUMPAD -->
<div class="numpad-wrap" id="numpad-wrap" style="display:none">
  <div class="numpad-label">Điều hướng câu hỏi</div>
  <div class="numpad" id="numpad"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="qhdr">
    <div>
      <div class="qhdr-title" id="qhdr-title"></div>
      <div class="qhdr-sub" id="qhdr-sub"></div>
    </div>
    <div class="score-row">
      <span>Đúng: <span class="score-g" id="sc-g">0</span></span>
      <span>Sai: <span class="score-r" id="sc-r">0</span></span>
    </div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="q-card" id="q-card">
    <div class="q-meta" id="q-meta"></div>
    <p class="q-text" id="q-text"></p>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="nav-bar">
    <div class="btn-row">
      <button class="btn btn-sm" id="btn-prev" onclick="go(-1)">← Trước</button>
      <button class="btn btn-sm btn-primary" id="btn-next" onclick="go(1)">Tiếp →</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-sm" onclick="showResult()">Kết quả</button>
      <button class="btn btn-sm" onclick="backHome()">⌂ Trang chủ</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="res-hero">
    <div class="res-pct" id="res-pct"></div>
    <div class="res-grade" id="res-grade"></div>
    <div class="res-sub" id="res-sub"></div>
  </div>
  <div class="res-stats">
    <div class="st-box"><div class="st-n" id="rs-done"></div><div class="st-l">Đã làm</div></div>
    <div class="st-box"><div class="st-n" style="color:var(--accent)" id="rs-ok"></div><div class="st-l">Đúng</div></div>
    <div class="st-box"><div class="st-n" style="color:var(--red)" id="rs-bad"></div><div class="st-l">Sai</div></div>
    <div class="st-box"><div class="st-n" style="color:var(--text3)" id="rs-skip"></div><div class="st-l">Bỏ qua</div></div>
  </div>
  <div class="wrong-section" id="wrong-section" style="display:none">
    <h3>Câu trả lời sai</h3>
    <div id="wrong-list"></div>
  </div>
  <div class="btn-row" style="justify-content:center;margin-top:16px">
    <button class="btn btn-primary" onclick="backHome()">⌂ Về trang chủ</button>
    <button class="btn" onclick="retryWrong()">Ôn lại câu sai</button>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// QUESTION BANK — generated from slide content
// ═══════════════════════════════════════════════════
const CHAPTERS = [
{id:'CH01',title:'Basic Concepts & Computer Evolution',qs:[
  {q:"What is 'computer architecture'?",opts:["The physical layout of components on a motherboard","Those attributes of a system visible to a programmer that have a direct impact on the logical execution of a program","The operational units and their interconnections that realize a specification","The clock speed and power consumption of a processor"],ans:[1],tag:"Architecture"},
  {q:"What is 'computer organization'?",opts:["The instruction set and addressing modes of a processor","The attributes visible to the programmer such as the instruction set","The operational units and their interconnections that realize the architectural specifications — hardware details transparent to the programmer","The number of bits used to represent data types"],ans:[2],tag:"Architecture"},
  {q:"Which of the following is an example of an ARCHITECTURAL attribute?",opts:["Control signals","Interface between the computer and peripherals","The memory technology used","The instruction set and number of bits used to represent data types"],ans:[3],tag:"Architecture"},
  {q:"Which of the following is an example of an ORGANIZATIONAL attribute?",opts:["The instruction set","Number of bits used to represent numbers","Control signals and the memory technology used","Techniques for addressing memory"],ans:[2],tag:"Architecture"},
  {q:"What are the four basic functions a computer can perform?",opts:["Fetch, Decode, Execute, Writeback","Data processing, Data storage, Data movement, Control","Input, Processing, Output, Storage","Arithmetic, Logic, Memory, I/O"],ans:[1],tag:"Function"},
  {q:"What are the four main structural components of a computer?",opts:["CPU, RAM, ROM, I/O","CPU, Main Memory, I/O, System Interconnection","ALU, Control Unit, Registers, Bus","Processor, Cache, Memory, Disk"],ans:[1],tag:"Structure"},
  {q:"What are the four major structural components of the CPU?",opts:["Registers, Cache, ALU, Bus","Control Unit, ALU, Registers, CPU Interconnection","Instruction Register, Program Counter, MAR, MBR","Fetch unit, Decode unit, Execute unit, Write unit"],ans:[1],tag:"CPU Structure"},
  {q:"In a multicore computer, what is a 'core'?",opts:["A physical piece of silicon containing multiple processors","An individual processing unit on a processor chip, equivalent in functionality to a CPU","The L1 cache inside a processor","The control unit of the main processor"],ans:[1],tag:"Multicore"},
  {q:"What is 'cache memory'?",opts:["The main memory of a computer","A smaller, faster memory placed between the processor and main memory to speed up access","A type of non-volatile storage","A register inside the ALU"],ans:[1],tag:"Cache"},
  {q:"In a memory hierarchy with multiple cache levels, which level is closest to the core?",opts:["L3","L2","L1","Main memory"],ans:[2],tag:"Cache"},
  {q:"What is the difference between a 'processor' and a 'core'?",opts:["They are identical terms","A processor is a physical piece of silicon that may contain one or more cores; a core is an individual processing unit on that chip","A core is larger than a processor","A processor refers only to the ALU, while a core includes the full CPU"],ans:[1],tag:"Multicore"},
  {q:"What is 'structure' in the context of describing a computer system?",opts:["The operation of each individual component","The way in which the components are interrelated","The function of the control unit","The binary encoding of instructions"],ans:[1],tag:"Structure"},
  {q:"What is 'function' in the context of describing a computer system?",opts:["The way in which the components are interrelated","The clock frequency of the processor","The operation of each individual component as part of the structure","The memory addressing scheme"],ans:[2],tag:"Structure"},
  {q:"What is an 'embedded system'?",opts:["A system running only embedded software (no OS)","A computer system (processor plus software) built into a device to perform a dedicated function — often with real-time constraints","A system with no external I/O devices","A deeply pipelined processor"],ans:[1],tag:"Embedded Systems"},
  {q:"What is a 'microcontroller'?",opts:["A high-performance multicore processor","A single chip containing the processor, non-volatile program memory (ROM), volatile data memory (RAM), a clock, and an I/O control unit","A processor designed only for floating-point operations","A type of cache memory"],ans:[1],tag:"Embedded Systems"},
  {q:"What is a 'deeply embedded system'?",opts:["An embedded system with very deep pipelines","A dedicated, single-purpose device using a microcontroller, not programmable once burned into ROM, with no user interaction and extreme resource constraints","An embedded system running a full Linux OS","A system embedded in a data center"],ans:[1],tag:"Embedded Systems"},
  {q:"ARM architecture is based on which design philosophy?",opts:["CISC (Complex Instruction Set Computer)","VLIW (Very Long Instruction Word)","RISC (Reduced Instruction Set Computer)","Harvard architecture exclusively"],ans:[2],tag:"ARM"},
  {q:"What does the ARM Cortex-A series target?",opts:["Low-power microcontrollers with no OS","Real-time embedded applications","Application processors for mobile devices that run complex OSes like Linux and Android","Ultra-low-cost 8-bit microcontrollers"],ans:[2],tag:"ARM"},
  {q:"What is the key difference between the von Neumann and Harvard architectures?",opts:["Von Neumann uses binary; Harvard uses decimal","Von Neumann uses the same memory and buses for both instructions and data; Harvard uses separate buses and memory for instructions and data","Von Neumann has no cache; Harvard has cache","Harvard uses RISC; Von Neumann uses CISC"],ans:[1],tag:"Architecture"},
  {q:"What is a 'printed circuit board' (PCB)?",opts:["A processor chip","A rigid flat board that holds and interconnects chips and other electronic components via copper pathways etched into the board","A type of non-volatile memory","The bus that connects CPU to RAM"],ans:[1],tag:"Structure"},
]},
{id:'CH02',title:'Performance Concepts',qs:[
  {q:"What technique enables a processor to work on multiple instructions simultaneously by performing different phases of each instruction at the same time?",opts:["Superscalar execution","Pipelining","Branch prediction","Speculative execution"],ans:[1],tag:"Performance"},
  {q:"What does 'branch prediction' allow a processor to do?",opts:["Execute multiple parallel pipelines","Prefetch correct instructions by predicting which branches will be processed next","Store intermediate results in temporary locations","Reduce the number of logic gates needed"],ans:[1],tag:"Performance"},
  {q:"What is 'superscalar execution'?",opts:["The ability to execute more than one instruction in every processor clock cycle using multiple parallel pipelines","The ability to execute instructions out of order","A technique for predicting branches","A method of caching instructions"],ans:[0],tag:"Performance"},
  {q:"What is 'data flow analysis' in processor design?",opts:["Analyzing which memory addresses are most frequently accessed","Analyzing which instructions are dependent on each other's results to create an optimized schedule","Analyzing the flow of data between cache levels","Analyzing I/O data transfer rates"],ans:[1],tag:"Performance"},
  {q:"Which technique increases the amount of work available for the processor by looking ahead in the instruction code to predict which groups of instructions will be processed?",opts:["Pipelining","Data flow analysis","Speculative execution","Branch prediction"],ans:[3],tag:"Performance"},
  {q:"What is 'performance balance' in computer design?",opts:["Balancing the number of processors with the memory size","Adjusting organization and architecture to compensate for mismatch among the capabilities of various components","Ensuring all cache levels are the same size","Balancing the power consumption across components"],ans:[1],tag:"Performance"},
  {q:"What is a key technique for reducing frequency of memory access and improving CPU-memory performance balance?",opts:["Increasing bus width","Incorporating cache structures between processor and main memory","Using faster I/O devices","Increasing the clock rate"],ans:[2],tag:"Performance"},
  {q:"According to the chapter, what are the three main approaches to increasing processor speed?",opts:["Increase hardware speed, increase cache size and speed, change processor organization","Use RISC, use pipelining, use superscalar","Increase RAM, increase clock rate, use solid state drives","Use multi-core, use hyperthreading, use SIMD"],ans:[0],tag:"Performance"},
]},
{id:'CH03',title:'Computer Function & Interconnection',qs:[
  {q:"Von Neumann architecture is based on three key concepts. Which of the following is NOT one of them?",opts:["Data and instructions are stored in a single read-write memory","Contents of memory are addressable by location","Execution occurs in a parallel fashion","Execution occurs in a sequential fashion (unless explicitly modified)"],ans:[2],tag:"Von Neumann"},
  {q:"What is the term for a program implemented in hardware by connecting logic components in a desired configuration?",opts:["Software program","Hardwired program","Firmware","Microprogram"],ans:[1],tag:"Von Neumann"},
  {q:"At the beginning of each instruction cycle, the processor fetches an instruction from memory. Which register holds the address of the instruction to be fetched next?",opts:["Instruction Register (IR)","Memory Address Register (MAR)","Memory Buffer Register (MBR)","Program Counter (PC)"],ans:[3],tag:"Instruction Cycle"},
  {q:"What does the Memory Address Register (MAR) contain?",opts:["The instruction most recently fetched","The address in memory for the next read or write operation","The data to be written into memory","The result of the most recent ALU operation"],ans:[1],tag:"Registers"},
  {q:"What does the Memory Buffer Register (MBR) contain?",opts:["Address of the next instruction","The instruction most recently fetched","Data to be written to memory or the last data read","The current program counter value"],ans:[2],tag:"Registers"},
  {q:"In general, the actions performed during instruction execution fall into four categories. Which of the following is NOT one of them?",opts:["Processor-memory","Processor-I/O","Data processing","Cache management"],ans:[3],tag:"Instruction Cycle"},
  {q:"What is the key purpose of the Instruction Register (IR)?",opts:["To hold the address of the next instruction","To hold the fetched instruction for decoding","To hold data read from memory","To point to the top of the stack"],ans:[1],tag:"Registers"},

{id:'CH04',title:'Memory Hierarchy & Locality',qs:[
  {q:"What is the 'principle of locality' (also called locality of reference)?",opts:["Memory access time decreases as memory size increases","During program execution, memory references by the processor tend to cluster","All memory locations are accessed with equal frequency","Memory is organized in a strict linear sequence"],ans:[1],tag:"Locality"},
  {q:"What does 'temporal locality' refer to?",opts:["The tendency to access memory locations whose addresses are near one another","The tendency to reference in the near future those memory units referenced in the recent past","The time delay between memory accesses","The physical proximity of memory chips"],ans:[1],tag:"Locality"},
  {q:"What does 'spatial locality' refer to?",opts:["The tendency to access the same memory location repeatedly","The geographic location of memory modules","The tendency to reference units of memory whose addresses are near one another","The time between consecutive memory accesses"],ans:[2],tag:"Locality"},
  {q:"Which of the following is NOT one of the three assertions on which locality is based?",opts:["During any interval, a program references memory locations non-uniformly","The probability that a given memory unit is referenced tends to change slowly over time","The correlation between past and future memory reference patterns tapers off over time","Memory references are always sequential and predictable"],ans:[3],tag:"Locality"},
  {q:"How is temporal locality typically exploited in cache memory?",opts:["By using larger cache blocks","By keeping recently used instruction and data values in cache memory","By prefetching anticipated data","By organizing cache into multiple levels"],ans:[1],tag:"Cache"},
  {q:"How is spatial locality generally exploited in cache design?",opts:["By keeping recently used data in cache","By using larger cache blocks and incorporating prefetching","By increasing clock speed","By using write-through policy"],ans:[1],tag:"Cache"},
  {q:"What is a 'word' in the context of memory organization?",opts:["A fixed number of bits (typically the natural unit of organization of memory)","Any 8-bit data value","The maximum addressable memory location","The size of the largest register"],ans:[0],tag:"Memory"},
  {q:"Which type of memory access method provides direct access to any memory location?",opts:["Sequential access","Direct access","Random access","Associative access"],ans:[2],tag:"Memory"},
]},
{id:'CH05',title:'Cache Memory',qs:[
  {q:"What is the minimum unit of transfer between cache and main memory called?",opts:["Word","Frame","Block","Line"],ans:[2],tag:"Cache"},

  {q:"What is a 'tag' in a cache line?",opts:["A portion of a cache line used for addressing purposes","The data stored in the cache line","A bit indicating if the line has been modified","The replacement policy indicator"],ans:[0],tag:"Cache"},

  {q:"What is a 'physical cache'?",opts:["A cache that stores data using virtual addresses","A cache that stores data using main memory physical addresses","A cache on the processor chip","A secondary cache"],ans:[1],tag:"Cache"},
  {q:"Which of the following is a mapping function used to map main memory blocks into cache lines?",opts:["LIFO","Direct, Associative, and Set-associative","Round-robin","Hash mapping"],ans:[1],tag:"Cache"},
  {q:"What is the 'write through' cache write policy?",opts:["Data is written only to cache and memory is updated only when cache line is replaced","All write operations are made to main memory as well as to the cache","Data is written only to cache","Data is written to a write buffer first"],ans:[1],tag:"Cache"},
  {q:"In a direct mapped cache, how many unique cache lines can a specific main memory block map to?",opts:["Any line — multiple options","Only two lines","Exactly one unique line","All lines equally"],ans:[2],tag:"Cache"},
  {q:"What is the 'write back' cache write policy?",opts:["All writes go to main memory immediately","Data is written only to cache, and memory is updated only when the cache line is replaced","Writes are stored in a write buffer","Data is written to both cache and memory in parallel"],ans:[1],tag:"Cache"},
]},

{id:'CH07',title:'External Memory',qs:[
  {q:"On a magnetic disk, what is the term for each concentric ring of data?",opts:["Sector","Cylinder","Track","Platter"],ans:[2],tag:"Disk"},

{id:'CH11',title:'Computer Arithmetic',qs:[

{id:'CH15',title:'Assembly Language',qs:[

  {q:"What is the primary goal of a superscalar architecture?",opts:["To increase clock frequency","To improve performance by executing more than one instruction per machine cycle","To reduce memory access time","To simplify the instruction set"],ans:[1],tag:"Superscalar"},
  {q:"What is 'machine parallelism' in the context of superscalar processors?",opts:["The number of cores in a processor","Determined by the number of parallel pipelines and the speed of mechanisms the processor uses to find independent instructions","The number of threads the OS can schedule simultaneously","The degree of instruction pipelining in a single pipeline"],ans:[1],tag:"Superscalar"},
  {q:"To enhance performance in a superscalar processor, which methods can be applied?",opts:["Increasing cache size only","Increasing clock frequency only","Duplication of resources, out-of-order issue, and register renaming — all of the mentioned","Only register renaming"],ans:[2],tag:"Superscalar"},
  {q:"What is a 'reservation station' in a superscalar processor?",opts:["A queue for memory requests","A set of input registers that buffer operations and operands for a functional unit, relieving bottleneck at the ID stage","A table tracking branch predictions","A buffer between cache levels"],ans:[1],tag:"Superscalar"},
  {q:"What is the 'reorder buffer' in a superscalar processor used for?",opts:["Storing branch prediction results","Holding results until it is safe to store them to memory or a register in program order","Caching frequently used instructions","Buffering data between L1 and L2 cache"],ans:[1],tag:"Superscalar"},
  {q:"What is 'instruction-level parallelism' (ILP)?",opts:["The ability to run multiple programs simultaneously","The ability to execute multiple instructions from a single instruction stream in parallel","The number of processors in a multicore system","The maximum number of threads per core"],ans:[1],tag:"Superscalar"},
  {q:"What is 'out-of-order execution' in a superscalar processor?",opts:["Executing instructions in reverse order","Executing instructions in an order different from the program order to avoid stalls, while preserving correct semantics","Executing multiple copies of the same instruction","Skipping instructions that cause hazards"],ans:[1],tag:"Superscalar"},
]},
{id:'CH19',title:'Control Unit Operation',qs:[
  {q:"What are 'micro-operations'?",opts:["The smallest unit of data stored in memory","The functional/atomic operations of a processor — very simple steps that each accomplish very little","Special instructions for I/O control","Microcode stored in a control memory"],ans:[1],tag:"Control Unit"},
  {q:"During the fetch cycle, which four registers are involved?",opts:["PC, IR, MAR, MBR","AC, IR, SP, PC","MAR, MBR, ALU, CU","PC, SP, BP, FLAGS"],ans:[0],tag:"Control Unit"},
  {q:"In the fetch cycle, what is the sequence of micro-operations?",opts:["IR → PC → MAR → MBR","PC → MAR (address bus), memory read → MBR, MBR → IR, PC incremented","MAR → IR → PC → MBR","MBR → MAR → IR → PC"],ans:[1],tag:"Control Unit"},
  {q:"What is 'microprogrammed control'?",opts:["Control implemented using standard logic gates","An approach where each machine instruction is implemented by a sequence of micro-operations defined in a control memory (microprogram)","A technique for implementing pipelining","A method for implementing cache replacement policies"],ans:[1],tag:"Control Unit"},
  {q:"The execution of a program consists of the sequential execution of instructions, each made up of subcycles. What are the typical subcycles?",opts:["Read, write, execute, terminate","Fetch, indirect, execute, interrupt","Load, store, compute, branch","Decode, fetch, execute, writeback"],ans:[1],tag:"Control Unit"},
  {q:"What is the purpose of the 'interrupt' subcycle in the instruction cycle?",opts:["To fetch the next instruction","To save the current process state and service a pending interrupt request","To decode the current instruction","To access indirect addressing chains"],ans:[1],tag:"Control Unit"},
  {q:"What does MAR (Memory Address Register) connect to on the system bus?",opts:["The data bus","The control bus","The address bus","The interrupt request line"],ans:[2],tag:"Control Unit"},
  {q:"What is the main purpose of the 'indirect' subcycle in the instruction cycle?",opts:["To process interrupts","To fetch the operand address when indirect addressing is used","To execute arithmetic operations","To write results back to memory"],ans:[1],tag:"Control Unit"},
]},
{id:'CH20',title:'Parallel Processing',qs:[
  {q:"In Flynn's taxonomy, what does SIMD stand for?",opts:["Single Instruction, Multiple Data","Single Instruction, Multiple Devices","Symmetric Instruction Multiple Dispatch","Sequential Instruction Multiple Data"],ans:[0],tag:"Parallel Processing"},
  {q:"In Flynn's taxonomy, what does MIMD stand for?",opts:["Multiple Instruction, Multiple Data","Multiple Instruction, Multiple Devices","Main Instruction Memory Database","Multiple Input Multiple Data"],ans:[0],tag:"Parallel Processing"},
  {q:"What type of parallel processor organization do SMPs, clusters, and NUMA systems fall into?",opts:["SISD","SIMD","MISD","MIMD"],ans:[3],tag:"Parallel Processing"},
  {q:"What is an SMP (Symmetric Multiprocessor)?",opts:["A system with asymmetric processors each handling different tasks","A standalone computer system where two or more similar processors share the same main memory and I/O, with approximately equal memory access time","A single-core processor with hyperthreading","A distributed computing cluster"],ans:[1],tag:"Parallel Processing"},
  {q:"What is NUMA (Non-Uniform Memory Access)?",opts:["A memory technology with uniform access speed","A multiprocessor organization where memory access time to different regions of memory differs for different processors","A cache coherence protocol","A type of virtual memory management"],ans:[1],tag:"Parallel Processing"},
  {q:"What is the main characteristic of NUMA compared to SMP?",opts:["NUMA is slower than SMP","In NUMA, each processor has local memory with faster access, but access to other processors' memory is slower","NUMA uses a shared bus while SMP uses a crossbar switch","NUMA supports fewer processors than SMP"],ans:[1],tag:"Parallel Processing"},
  {q:"What is a 'cluster' in the context of parallel processing?",opts:["A group of cache memory banks","A collection of independent uniprocessors or SMPs interconnected to work together","A multi-threaded single processor","A NUMA memory region"],ans:[1],tag:"Parallel Processing"},
  {q:"In Amdahl's Law for multiprocessors, if f = 0.9 (90% parallelizable) and 4 processors are used, the speedup factor is approximately?",opts:["1.8x (80% faster)","2.5x (150% faster)","3.07x (about 307% of single processor performance, i.e., speedup ≈ 3.07)","4x (400% faster)"],ans:[2],tag:"Performance"},
]},
{id:'CH21',title:'Multicore Computers',qs:[
  {q:"What is 'Simultaneous Multithreading' (SMT)?",opts:["Running multiple programs on multiple cores","Replicating register banks so that multiple threads can share the use of pipeline resources in a single core","A technique for superscalar execution","A cache coherence protocol for multicore systems"],ans:[1],tag:"Multicore"},
  {q:"What is the primary motivation for moving from single-core superscalar to multicore processors?",opts:["Single-core processors cannot use pipelines","Diminishing returns from increasing pipeline stages and parallel pipelines in a single core, combined with power density issues","Multicore is cheaper to manufacture","Software requires multicore to function"],ans:[1],tag:"Multicore"},
  {q:"Which organizational changes in processor design exploited instruction-level parallelism (ILP), in chronological order?",opts:["Multicore, then superscalar, then pipelining","Pipelining, then superscalar, then SMT (simultaneous multithreading)","SMT, then pipelining, then superscalar","Superscalar, then pipelining, then multicore"],ans:[1],tag:"Multicore"},
  {q:"Why does increasing the number of superscalar pipelines have diminishing returns?",opts:["More pipelines require more memory","More logic is required to manage hazards, and compiled code rarely exposes enough ILP to use more than about 6 parallel pipelines","More pipelines increase the clock frequency limit","More pipelines increase power consumption linearly"],ans:[1],tag:"Multicore"},
  {q:"In multicore design, why is an increasing fraction of the chip area devoted to cache memory?",opts:["Cache memory is faster than logic transistors","Memory transistors are smaller and have much lower power density than logic transistors, making cache an efficient use of chip area","Cache memory is cheaper to manufacture","Cache requires no special cooling"],ans:[1],tag:"Multicore"},
  {q:"What is the advantage of multithreading from a performance perspective?",opts:["It doubles the clock frequency","It increases utilization of processor resources by hiding the latency of cache misses and other long-latency events","It simplifies the instruction set","It eliminates the need for branch prediction"],ans:[1],tag:"Multicore"},
  {q:"What is 'thread-level parallelism' in multicore systems?",opts:["Running multiple instructions from a single thread simultaneously","Executing multiple threads on different cores or processors simultaneously","The number of hardware threads per core","The number of instructions per pipeline stage"],ans:[1],tag:"Multicore"},
  {q:"What limits the effectiveness of SMT (Simultaneous Multithreading)?",opts:["SMT is limited only by clock speed","The complexity of managing multiple threads over a set of pipelines limits the number of threads and pipelines that can be effectively utilized","SMT requires special operating system support that is rarely available","SMT only works with floating-point instructions"],ans:[1],tag:"Multicore"},
]},
];

// ── STATE ──
let pool=[], idx=0, answered={}, score=0, wrongCount=0, wrongQs=new Set();
let multiSel=[], curChapter=null;
const chProgress={};

function init(){
  const grid=document.getElementById('ch-grid');
  CHAPTERS.forEach((ch,ci)=>{
    chProgress[ch.id]={done:0,score:0};
    const c=document.createElement('div');
    c.className='ch-card';
    c.id='chcard-'+ch.id;
    c.innerHTML=`<div class="ch-num">CH ${ch.id.replace('CH','').padStart(2,'0')}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-count" id="chp-${ch.id}">${ch.qs.length} câu</div>
      <div class="ch-done">✓</div>`;
    c.onclick=()=>startChapter(ci);
    grid.appendChild(c);
  });
}

function startChapter(ci){
  curChapter=ci;
  pool=[...CHAPTERS[ci].qs];
  beginQuiz(`Chương ${CHAPTERS[ci].id.replace('CH','')} — ${CHAPTERS[ci].title}`);
}
function startAll(){
  curChapter=null;
  pool=CHAPTERS.flatMap(ch=>ch.qs.map(q=>({...q,_ch:ch.id})));
  beginQuiz('Tất cả các chương');
}
function startRandom(){
  curChapter=null;
  pool=CHAPTERS.flatMap(ch=>ch.qs.map(q=>({...q,_ch:ch.id}))).sort(()=>Math.random()-0.5);
  beginQuiz('Ngẫu nhiên — Tất cả chương');
}
function startWrong(){
  if(!wrongQs.size){alert('Chưa có câu sai nào!');return;}
  pool=[];
  CHAPTERS.forEach(ch=>ch.qs.forEach((q,qi)=>{
    if(wrongQs.has(ch.id+':'+qi)) pool.push({...q,_ch:ch.id,_qi:qi});
  }));
  if(!pool.length){alert('Không tìm thấy câu sai!');return;}
  beginQuiz('Ôn lại câu sai');
}
function retryWrong(){startWrong();}

function beginQuiz(title){
  idx=0; answered={}; score=0; wrongCount=0; multiSel=[];
  document.getElementById('home-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('numpad-wrap').style.display='block';
  document.getElementById('qhdr-title').textContent=title;
  buildNumpad();
  renderQ();
}

function renderQ(){
  const q=pool[idx], total=pool.length;
  document.getElementById('prog-fill').style.width=((idx/total)*100).toFixed(1)+'%';
  document.getElementById('qhdr-sub').textContent=`Câu ${idx+1} / ${total}`;
  document.getElementById('sc-g').textContent=score;
  document.getElementById('sc-r').textContent=wrongCount;
  const isMulti=q.ans.length>1;
  const meta=document.getElementById('q-meta');
  meta.innerHTML=`<span class="q-badge q-num-badge">Q ${idx+1}</span>
    <span class="q-badge q-tag-badge">${q.tag||''}</span>
    ${q._ch?`<span class="q-badge" style="color:var(--blue);background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2)">CH${q._ch.replace('CH','')}</span>`:''}
    ${isMulti?`<span class="q-badge q-multi-badge">Chọn nhiều</span>`:''}`;
  document.getElementById('q-text').textContent=q.q;
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  const state=answered[idx];
  multiSel=state?[...state.chosen]:[];
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-key">${String.fromCharCode(65+i)}</span><span>${o}</span>`;
    if(state){
      b.disabled=true;
      if(q.ans.includes(i)) b.classList.add(state.chosen.includes(i)?'correct':'reveal');
      else if(state.chosen.includes(i)) b.classList.add('wrong');
    } else {
      if(!isMulti) b.onclick=()=>handleSingle(i);
      else {
        if(multiSel.includes(i)) b.classList.add('sel');
        b.onclick=()=>handleMultiClick(i,b);
      }
    }
    opts.appendChild(b);
  });
  if(isMulti&&!state){
    const cb=document.createElement('button');
    cb.className='btn btn-primary btn-sm';cb.style.marginTop='12px';
    cb.textContent='Xác nhận';cb.id='confirm-btn';cb.onclick=confirmMulti;
    opts.appendChild(cb);
  }
  const fb=document.getElementById('feedback');
  if(state){
    fb.style.display='block';
    fb.className='feedback '+(state.ok?'ok':'no');
    if(state.ok) fb.textContent='✓ Chính xác!';
    else fb.textContent='✗ Đáp án đúng: '+q.ans.map(a=>String.fromCharCode(65+a)+'. '+q.opts[a]).join(' | ');
  } else fb.style.display='none';
  document.getElementById('btn-next').textContent=idx===pool.length-1?'Xem kết quả →':'Tiếp →';
  document.getElementById('btn-prev').style.opacity=idx===0?'0.3':'1';
  updateNumpad();
  document.getElementById('q-card').style.animation='none';
  requestAnimationFrame(()=>document.getElementById('q-card').style.animation='');
}

function handleSingle(i){
  const q=pool[idx], ok=q.ans.includes(i);
  answered[idx]={chosen:[i],ok};
  if(ok) score++; else {wrongCount++;markWrong(q,idx);}
  renderQ();
}
function handleMultiClick(i,btn){
  const pos=multiSel.indexOf(i);
  if(pos===-1) multiSel.push(i); else multiSel.splice(pos,1);
  document.querySelectorAll('.opt').forEach((b,bi)=>{
    if(bi<pool[idx].opts.length) b.classList.toggle('sel',multiSel.includes(bi));
  });
}
function confirmMulti(){
  if(!multiSel.length){alert('Hãy chọn ít nhất một đáp án!');return;}
  const q=pool[idx];
  const ok=q.ans.length===multiSel.length&&q.ans.every(a=>multiSel.includes(a));
  answered[idx]={chosen:[...multiSel],ok};
  if(ok) score++; else {wrongCount++;markWrong(q,idx);}
  renderQ();
}
function markWrong(q,pi){
  const chId=q._ch||(curChapter!=null?CHAPTERS[curChapter].id:'');
  const qi=q._qi!=null?q._qi:CHAPTERS.find(c=>c.id===chId)?.qs.indexOf(q);
  if(chId&&qi!=null) wrongQs.add(chId+':'+qi);
}

function go(dir){
  const n=idx+dir;
  if(n<0) return;
  if(n>=pool.length){showResult();return;}
  idx=n; multiSel=[]; renderQ();
}

function buildNumpad(){
  const np=document.getElementById('numpad');
  np.innerHTML='';
  pool.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='np'; b.textContent=i+1; b.id='np-'+i;
    b.onclick=()=>{idx=i;multiSel=[];renderQ();};
    np.appendChild(b);
  });
}
function updateNumpad(){
  pool.forEach((_,i)=>{
    const b=document.getElementById('np-'+i);
    if(!b) return;
    b.className='np';
    if(i===idx) b.classList.add('cur');
    else if(answered[i]) b.classList.add(answered[i].ok?'ok':'bad');
  });
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('numpad-wrap').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=pool.length, done=Object.keys(answered).length;
  const skip=total-done;
  const pct=done>0?Math.round(score/done*100):0;
  let grade,color;
  if(pct>=90){grade='🏆 Xuất sắc!';color='var(--accent)';}
  else if(pct>=80){grade='✓ Giỏi';color='var(--accent2)';}
  else if(pct>=65){grade='~ Khá';color='var(--yellow)';}
  else if(pct>=50){grade='~ Trung bình';color='var(--yellow)';}
  else{grade='✗ Cần ôn thêm';color='var(--red)';}
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-pct').style.color=color;
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-grade').style.color=color;
  document.getElementById('res-sub').textContent=`${score} / ${done} câu đúng trên ${total} câu`;
  document.getElementById('rs-done').textContent=done;
  document.getElementById('rs-ok').textContent=score;
  document.getElementById('rs-bad').textContent=wrongCount;
  document.getElementById('rs-skip').textContent=skip;
  // wrong review
  const wrongs=pool.map((q,i)=>({q,i,s:answered[i]})).filter(x=>x.s&&!x.s.ok);
  const ws=document.getElementById('wrong-section');
  const wl=document.getElementById('wrong-list');
  if(wrongs.length){
    ws.style.display='block';
    wl.innerHTML=wrongs.map(({q,s})=>{
      const correct=q.ans.map(a=>q.opts[a]).join(' / ');
      const chosen=s.chosen.map(a=>q.opts[a]).join(' / ');
      return `<div class="wi"><div class="wi-q">${q.q}</div>
        <div class="wi-tags">
          <span class="wi-your">Bạn: ${chosen}</span>
          <span class="wi-ans">Đúng: ${correct}</span>
        </div></div>`;
    }).join('');
  } else ws.style.display='none';
  if(wrongQs.size>0) document.getElementById('btn-retry-wrong').style.display='inline-flex';
  // update chapter progress
  if(curChapter!=null){
    const ch=CHAPTERS[curChapter];
    const el=document.getElementById('chp-'+ch.id);
    if(el) el.textContent=`${score}/${done} đúng`;
    const card=document.getElementById('chcard-'+ch.id);
    if(card&&pct>=70) card.classList.add('completed');
  }
}

function backHome(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('numpad-wrap').style.display='none';
  document.getElementById('home-screen').style.display='block';
  if(wrongQs.size>0) document.getElementById('btn-retry-wrong').style.display='inline-flex';
}

init();
</script>
